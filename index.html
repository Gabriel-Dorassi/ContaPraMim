<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Conta Pra Mim">
  <meta name="description" content="Organize suas finanças com o método do Breno Nogueira">
  <title>Conta Pra Mim</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<div id="app">

  <!-- ═══ TELA: SALDOS ═══ -->
  <div id="screen-saldos" class="screen active">
    <header class="top-bar">
      <button class="icon-btn" id="btnHorizonte">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <div class="month-nav">
        <button class="nav-arrow" id="btnPrevMonth">‹</button>
        <span class="month-label" id="monthLabel">Abr/26</span>
        <button class="nav-arrow" id="btnNextMonth">›</button>
      </div>
      <button class="icon-btn" id="btnCalendar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </button>
    </header>

    <div class="col-headers" id="colHeaders">
      <span class="col-day-hdr">Dia</span>
      <div class="col-mid-wrap">
        <button class="col-mid-btn" id="colMidBtn">
          <span class="col-mid-dot" id="colMidDot"></span>
          <span id="colMidLabel">Saídas</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <!-- Dropdown picker -->
        <div class="col-picker hidden" id="colPicker">
          <button class="col-pick-opt" data-mode="saidas">
            <span class="pick-dot saida-dot"></span> Saídas
          </button>
          <button class="col-pick-opt" data-mode="entradas">
            <span class="pick-dot entrada-dot"></span> Entradas
          </button>
          <button class="col-pick-opt" data-mode="diarios">
            <span class="pick-dot diario-dot"></span> Diários
          </button>
          <button class="col-pick-opt" data-mode="cartao">
            <span class="pick-dot cartao-dot"></span> Cartão
          </button>
        </div>
      </div>
      <div class="col-saldo-hdr">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
        Saldos
      </div>
    </div>

    <div class="days-list" id="daysList"></div>
  </div>

  <!-- ═══ TELA: TOTAIS ═══ -->
  <div id="screen-totais" class="screen">
    <header class="top-bar">
      <div class="month-nav">
        <button class="nav-arrow" id="btnPrevMonthTotais">‹</button>
        <span class="month-label" id="monthLabelTotais">Abr/26</span>
        <button class="nav-arrow" id="btnNextMonthTotais">›</button>
      </div>
    </header>
    <div class="totais-content" id="totaisContent"></div>
  </div>

  <!-- ═══ TELA: TAGS ═══ -->
  <div id="screen-tags" class="screen">
    <header class="top-bar simple">
      <h2 class="screen-title">Tags</h2>
      <button class="icon-btn" id="btnAddTag">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </header>
    <div class="tags-list" id="tagsList"></div>
  </div>

  <!-- ═══ TELA: MENU ═══ -->
  <div id="screen-menu" class="screen">
    <header class="top-bar simple">
      <h2 class="screen-title">Menu</h2>
    </header>
    <div class="menu-content" id="menuContent"></div>
  </div>

  <!-- ═══ TELA: HORIZONTE ═══ -->
  <div id="screen-horizonte" class="screen">
    <header class="top-bar simple">
      <button class="icon-btn" id="btnBackHorizonte">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <h2 class="screen-title">Horizonte de saldos</h2>
      <div style="width:36px"></div>
    </header>
    <div class="horizonte-content" id="horizonteContent"></div>
  </div>

  <!-- ═══ TELA: PREVISÃO DE DIÁRIO ═══ -->
  <div id="screen-previsao" class="screen">
    <header class="top-bar simple">
      <button class="icon-btn" id="btnBackPrevisao">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <h2 class="screen-title">Previsão de diário</h2>
      <button class="icon-btn" id="btnAddPrevisao">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </header>
    <div class="previsao-content" id="previsaoContent"></div>
  </div>

  <!-- ═══ MODAL: ADICIONAR LANÇAMENTO ═══ -->
  <div id="modalOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-sheet" id="modalSheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <button class="modal-close" id="btnModalClose">✕</button>
        <h3 class="modal-title" id="modalTitle">Novo lançamento</h3>
        <button class="modal-save" id="btnModalSave">Salvar</button>
      </div>

      <!-- Tipo: Saída / Entrada / Cartão -->
      <div class="type-toggle">
        <button class="type-btn active" data-type="saida" id="typeSaida">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          Saída
        </button>
        <button class="type-btn" data-type="entrada" id="typeEntrada">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
          Entrada
        </button>
        <button class="type-btn" data-type="cartao" id="typeCartao">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>
          Cartão
        </button>
      </div>

      <!-- Valor -->
      <div class="amount-display">
        <span class="amount-currency">R$</span>
        <input type="text" id="amountInput" class="amount-input" placeholder="0,00" inputmode="decimal" autocomplete="off">
      </div>

      <!-- Descrição -->
      <div class="form-field">
        <label class="field-label">Descrição</label>
        <input type="text" id="descInput" class="field-input" placeholder="Ex: iFood">
      </div>

      <!-- Data (saída/entrada) -->
      <div class="form-field" id="fieldData">
        <label class="field-label">Data</label>
        <input type="date" id="dateInput" class="field-input">
      </div>

      <!-- Vencimento (cartão) -->
      <div class="form-field hidden" id="fieldVencimento">
        <label class="field-label">Vencimento da fatura</label>
        <input type="date" id="vencimentoInput" class="field-input">
      </div>

      <!-- Tag -->
      <div class="form-field">
        <label class="field-label">Tag</label>
        <div class="tag-selector-scroll" id="tagSelectorScroll"></div>
      </div>

      <!-- Conta (não cartão) -->
      <div class="form-field" id="fieldConta">
        <label class="field-label">Conta</label>
        <select id="accountSelect" class="field-select"></select>
      </div>

      <!-- Recorrente -->
      <div class="form-field form-row">
        <label class="field-label">Recorrente</label>
        <label class="toggle-switch">
          <input type="checkbox" id="recurringCheck">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Parcelas (visível só quando recorrente ativado) -->
      <div class="form-field parcelas-field hidden" id="parcelasField">
        <!-- Tipo de recorrência -->
        <div class="recorrencia-tipo">
          <label class="field-label" style="margin-bottom:8px">Tipo de recorrência</label>
          <div class="recorrencia-toggle">
            <button class="rec-opt active" id="recNVezes" data-rec="nvezes">Nº de vezes</button>
            <button class="rec-opt" id="recSemFim" data-rec="semfim">A perder de vista</button>
          </div>
        </div>

        <!-- Seletor de nº (só quando nvezes) -->
        <div id="nVezesField" style="margin-top:12px">
          <label class="field-label">Número de parcelas</label>
          <div class="parcelas-row">
            <button class="parcelas-btn" id="parcelasDecr">−</button>
            <div class="parcelas-display">
              <input type="number" id="parcelasInput" class="parcelas-input" value="12" min="1" max="360">
              <span class="parcelas-label">× meses</span>
            </div>
            <button class="parcelas-btn" id="parcelasIncr">+</button>
          </div>
          <div class="parcelas-presets">
            <button class="preset-chip" data-n="6">6×</button>
            <button class="preset-chip" data-n="12">12×</button>
            <button class="preset-chip" data-n="24">24×</button>
            <button class="preset-chip" data-n="36">36×</button>
            <button class="preset-chip" data-n="48">48×</button>
            <button class="preset-chip" data-n="60">60×</button>
          </div>
        </div>

        <!-- Info da previsão de fim -->
        <div class="parcelas-info" id="parcelasInfo"></div>
      </div>

      <input type="hidden" id="editingId">
    </div>
  </div>

  <!-- ═══ MODAL: DETALHE DO DIA ═══ -->
  <div id="dayDetailOverlay" class="modal-overlay hidden">
    <div class="modal-sheet" id="dayDetailSheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <button class="modal-close" id="btnDayDetailClose">✕</button>
        <h3 class="modal-title" id="dayDetailTitle">Dia 1</h3>
        <button class="icon-btn accent" id="btnAddToDayDetail">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
      <div class="day-detail-list" id="dayDetailList"></div>
    </div>
  </div>

  <!-- ═══ BOTTOM NAV ═══ -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-screen="saldos" id="navSaldos">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      <span>Saldos</span>
    </button>
    <button class="nav-item" data-screen="totais" id="navTotais">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      <span>Totais</span>
    </button>
    <button class="nav-item fab" id="navAdd">
      <div class="fab-btn" id="fabBtn">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      </div>
    </button>
    <button class="nav-item" data-screen="tags" id="navTags">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor"/></svg>
      <span>Tags</span>
    </button>
    <button class="nav-item" data-screen="menu" id="navMenu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58z"/></svg>
      <span>Menu</span>
    </button>
  </nav>

</div>
<script src="app.js"></script>
</body>
</html>
